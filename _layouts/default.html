<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 50, '...' }}">
    <title>
        {% if page.title %}
            {{ page.title }} - {{ site.name }}
        {% else %}
            {{ site.name }}
        {% endif %}
    </title>
    <link rel="stylesheet" href="{{ site.url }}{{ site.baseurl }}/styles.css">
    <link rel="icon" href="https://www.bilibili.com/favicon.ico" type="image/x-icon">
    {% if page.background_image == "used" %}
    <style>
        body {
            position: relative;
        }

        body::before {
            position: fixed;
            content: '';
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("{{ site.background_image }}") no-repeat center center fixed;
            background-size: cover;
            background-position: center;
            opacity: 0.9; /* 设置图片不透明度，0-1之间 */
            z-index: -1;
        }

        header {
            background-color: rgba(255, 255, 255, 0.7);
        }

        header h1 {
            color: var(--primary-color-dark);
        }

        nav a {
            color: var(--primary-color-dark);
        }

        footer p {
            color: #ddd;
        }
    </style>
    {% endif %}
</head>
<body>
<header>
    <h1>{{ site.name }}</h1>
    <nav>
        <ul>
            <li><a href="{{ site.url }}{{ site.baseurl }}">首页</a></li>
            <li><a href="{{ site.url }}{{ site.baseurl }}/blog">blog</a></li>
            <li><a href="{{ site.url }}{{ site.baseurl }}/about">关于我</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <main>
        {{ content }}
    </main>
</div>

</body>

</html>
