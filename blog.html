---
layout: default
title: blog
---

{% for post in site.posts %}
<div class="card-container">
    <section class="card">
        <h2>{{ post.title }}</h2>
        <p>{{ post.description | default: post.excerpt | strip_html | strip_newlines | truncate: 50, '...' }}</p>
        <p class="note">写作时间: {{ post.date | date: "%Y-%m-%d" }}</p>
        <a href="{{ post.url | relative_url }}" class="btn" style="color: white">阅读全文 →</a>
    </section>
</div>
{% endfor %}
